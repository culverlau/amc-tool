name: Seat Sniper

on:
  workflow_dispatch:

jobs:
  snipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore sniper state
        uses: actions/cache@v4
        with:
          path: sniper_state.json
          key: sniper-state-${{ github.run_id }}
          restore-keys: sniper-state-

      - name: Install dependencies
        run: pip install requests playwright && python -m playwright install --with-deps chromium

      - name: Run seat sniper
        run: python scripts/snipe_seats.py

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: failure_screenshots/
          if-no-files-found: ignore

      - name: Save sniper state
        uses: actions/cache@v4
        with:
          path: sniper_state.json
          key: sniper-state-${{ github.run_id }}
