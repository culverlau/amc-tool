name: Seat Sniper

on:
  workflow_dispatch:

jobs:
  snipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore sniper state
        uses: actions/cache@v4
        with:
          path: sniper_state.json
          key: sniper-state-${{ github.run_id }}
          restore-keys: sniper-state-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-sniper-${{ runner.os }}-playwright-1.60.0

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-1.60.0

      - name: Install Python dependencies
        run: pip install requests playwright==1.60.0

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      - name: Run seat sniper
        run: python scripts/snipe_seats.py

      - name: Save sniper state
        uses: actions/cache@v4
        with:
          path: sniper_state.json
          key: sniper-state-${{ github.run_id }}
